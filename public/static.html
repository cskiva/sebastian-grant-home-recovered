    <script type="text/javascript">
        window.addEventListener('load', (event) => {
            function GetURLParameter(sParam) {
                var sPageURL = window.location.search.substring(1);
                var sURLVariables = sPageURL.split('&');
                for (var i = 0; i < sURLVariables.length; i++) {
                    var sParameterName = sURLVariables[i].split('=');
                    if (sParameterName[0] == sParam) {
                        return sParameterName[1];
                    }
                }
            }

            var zoomify = GetURLParameter('zoomify');
            var zoomifyUrl = "https://www.sebastiangrantcdn.com/zoomify/Images/Elkiva/" + zoomify;
            document.title = zoomify + " - Zoom frame - Sebastian Grant";

            if (zoomify) {
                Z.showImage("myZoomifyContainer", zoomifyUrl, "zSkinPath=skins/Default&zBaseZIndex=-1&zNavigatorTop=65&zNavigatorLeft=5&zInitialZoom=50&zNavigatorRectangleColor=#000000");
            }
        });
    </script>

    <!-- Zoomify Script -->

    <script type="text/javascript" src="./zoomify/ZoomifyImageViewerPro-min.js"></script>
